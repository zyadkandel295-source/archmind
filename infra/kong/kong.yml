_format_version: "3.0"
_transform: true

services:
  - name: archmind-api
    url: http://api:4000
    routes:
      - name: archmind-api-routes
        paths:
          - /api
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
      - name: rate-limiting
        config:
          minute: 120
          policy: local
      - name: request-size-limiting
        config:
          allowed_payload_size: 15
