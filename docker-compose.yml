services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archmind}
      POSTGRES_USER: ${POSTGRES_USER:-archmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archmind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"  # Remove in production; use internal Docker network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archmind} -d ${POSTGRES_DB:-archmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-archmind-redis-dev}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"  # Remove in production; use internal Docker network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-archmind-redis-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
